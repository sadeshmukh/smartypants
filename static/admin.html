<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Admin — Vision Assistant</title>
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
  background: #0b0f14;
  color: #e6edf3;
  padding: 28px 32px;
}
h1 { margin: 0 0 4px; font-size: 20px; }
.sub { color: #8b949e; font-size: 13px; margin: 0 0 24px; }

.top-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.pill {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 20px;
  padding: 6px 14px;
  font-size: 14px;
}
.pill strong { color: #58a6ff; }

.live-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #39d353;
  display: inline-block;
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }

button { cursor: pointer; border: none; border-radius: 8px; font-weight: 600; }
.btn-danger {
  background: #da3633;
  color: #fff;
  padding: 7px 14px;
  font-size: 13px;
}
.btn-danger:hover { background: #f85149; }
.btn-danger:disabled { background: #2a1414; color: #8b949e; cursor: default; }

.btn-wave {
  background: #238636;
  color: #fff;
  padding: 7px 14px;
  font-size: 13px;
}
.btn-wave:hover { background: #2ea043; }

.card {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 10px;
  overflow: hidden;
}

table { width: 100%; border-collapse: collapse; }
thead tr { border-bottom: 1px solid #30363d; }
th {
  text-align: left;
  font-size: 11px;
  color: #8b949e;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding: 10px 16px;
}
td { padding: 11px 16px; font-size: 14px; border-bottom: 1px solid #21262d; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #1c2128; }

.mono { font-family: monospace; font-size: 12px; color: #8b949e; }
.empty-row td { color: #8b949e; text-align: center; padding: 48px 16px; font-size: 14px; }
</style>
</head>
<body>
<h1>🛠 Vision Assistant — Admin</h1>
<p class="sub">Manage connected viewer sessions. Refreshes every 2 seconds.</p>

<div class="top-bar">
  <div class="pill">Sessions: <strong id="clientCount">—</strong></div>
  <!-- Global Cloud Toggle -->
  <div class="pill" style="display: flex; align-items: center; gap: 8px;">
    <label for="forceCloudToggle" style="font-weight: 500; cursor: pointer;">Force NVIDIA Cloud Only:</label>
    <input type="checkbox" id="forceCloudToggle" onchange="toggleGlobalCloud(this.checked)" style="cursor: pointer;" />
  </div>
  <button class="btn-danger" id="kickAllBtn" onclick="kickAll()" disabled>Disconnect All</button>
  <span class="live-dot" title="Live"></span>
</div>

<div class="card">
  <table>
    <thead>
      <tr>
        <th>Client ID</th>
        <th>IP</th>
        <th>Connected</th>
        <th>Frames</th>
        <th>Override to Jetson</th>
        <th>Remote Trigger</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script>
function fmtDuration(s) {
  if (s < 60) return `${s}s`;
  if (s < 3600) return `${Math.floor(s / 60)}m ${s % 60}s`;
  return `${Math.floor(s / 3600)}h ${Math.floor((s % 3600) / 60)}m`;
}

async function refreshGlobalConfig() {
  try {
    const res = await fetch("/api/admin/config");
    const config = await res.json();
    document.getElementById("forceCloudToggle").checked = config.force_cloud;
  } catch (e) {
    console.error("Error loading config:", e);
  }
}

async function toggleGlobalCloud(checked) {
  await fetch("/api/admin/config", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ force_cloud: checked })
  });
}

async function toggleClientOverride(clientId, checked) {
  await fetch(`/api/admin/clients/${encodeURIComponent(clientId)}/override`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ override_to_jetson: checked })
  });
}

async function waveClient(clientId) {
  try {
    await fetch(`/api/admin/clients/${encodeURIComponent(clientId)}/wave`, { method: "POST" });
  } catch (e) {
    console.error("Error waving to client:", e);
  }
}

async function refresh() {
  let clients;
  try {
    const res = await fetch("/api/admin/clients");
    clients = await res.json();
  } catch {
    return;
  }

  document.getElementById("clientCount").textContent = clients.length;
  document.getElementById("kickAllBtn").disabled = clients.length === 0;

  const tbody = document.getElementById("tbody");
  if (clients.length === 0) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="7">No clients connected</td></tr>';
    return;
  }
  tbody.innerHTML = clients.map(c => `
    <tr>
      <td class="mono">${c.id.slice(-12)}</td>
      <td>${c.ip}</td>
      <td>${fmtDuration(c.connected_seconds)}</td>
      <td>${c.frame_count.toLocaleString()}</td>
      <td>
        <input type="checkbox" ${c.override_to_jetson ? 'checked' : ''} onchange="toggleClientOverride('${c.id}', this.checked)" style="cursor: pointer;" />
      </td>
      <td><button class="btn-wave" onclick="waveClient('${c.id}')">👋 Wave</button></td>
      <td><button class="btn-danger" onclick="kickOne('${c.id}')">Disconnect</button></td>
    </tr>
  `).join("");
}

async function kickOne(id) {
  await fetch(`/api/admin/clients/${encodeURIComponent(id)}`, { method: "DELETE" });
  refresh();
}

async function kickAll() {
  document.getElementById("kickAllBtn").disabled = true;
  await fetch("/api/admin/clients", { method: "DELETE" });
  refresh();
}

refreshGlobalConfig();
refresh();
setInterval(refresh, 2000);
</script>
</body>
</html>
